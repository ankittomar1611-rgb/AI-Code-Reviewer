<!DOCTYPE html>
<html>

<head>
    <title>AI Code Reviewer</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>AI Code Reviewer</h1>

    <form method="POST">

        <select name="language">

            <option>Python</option>
            <option>Java</option>
            <option>JavaScript</option>
            <option>C++</option>

        </select>

        <textarea
        name="code"
        placeholder="Paste your code here..."
        required></textarea>

        <button type="submit">
            Review Code
        </button>

    </form>

    <div class="output">

        <h2>AI Review</h2>

        <pre>{{ review }}</pre>

    </div>

</div>

</body>
</html>
